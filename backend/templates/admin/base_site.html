{% extends "admin/base.html" %}
{% load static %}

{% block title %}{{ title }} | JanMat Access Portal{% endblock %}

{% block extrahead %}
{{ block.super }}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link
  href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Serif:wght@700&display=swap"
  rel="stylesheet">
<link rel="stylesheet" type="text/css" href="{% static 'admin/css/custom_admin.css' %}">
{% endblock %}

{% block branding %}
<div id="branding">
  <div class="institutional-brand-wrapper">
    <img src="{% static 'assets/images/ashoka-black.png' %}" alt="ECI" class="institutional-header-logo">
    <h1 id="site-name">
      <a href="{% url 'admin:index' %}">
        JANMAT
        
      </a>
    </h1>
  </div>
</div>
{% endblock %}

{% block nav-global %}{% endblock %}
{% block language_chooser %}{% endblock %}
