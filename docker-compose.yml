# JanMat - Secure Biometric E-Voting Booth System
# Docker Compose Configuration with Tenant Isolation

services:
  postgres:
    image: postgres:15-alpine
    container_name: janmat_postgres
    environment:
      POSTGRES_DB: ${DB_NAME:-janmat_db}
      POSTGRES_USER: ${DB_USER:-janmat_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-janmat_pass}
      POSTGRES_HOST_AUTH_METHOD: ${DB_AUTH_METHOD:-md5}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/janmat_init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-janmat_user} -d ${DB_NAME:-janmat_db}"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - janmat-network
    security_opt:
      - no-new-privileges:true

  backend:
    build:
      context: .
      dockerfile: ./backend/Dockerfile
      target: ${BUILD_TARGET:-production}
    container_name: janmat_backend
    env_file:
      - .env
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./logs:/app/logs
      - ./backend:/app
      - backend_static:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - janmat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    security_opt:
      - no-new-privileges:true

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: janmat_frontend
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - janmat-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
    driver: local
  backend_static:
    driver: local

networks:
  janmat-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16