version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: janmat_postgres
    environment:
      POSTGRES_DB: janmat_db
      POSTGRES_USER: janmat_user
      POSTGRES_PASSWORD: janmat_secure_pass_2024
      POSTGRES_HOST_AUTH_METHOD: md5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U janmat_user -d janmat_db"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data: