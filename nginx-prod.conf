# =============================================================================
# JanMat Production — Host-Level Nginx Reverse Proxy
# =============================================================================
# Place this file on the server at: /etc/nginx/sites-available/janmat 
# Then symlink:  ln -s /etc/nginx/sites-available/janmat /etc/nginx/sites-enabled/janmat
# Then get SSL:  certbot --nginx -d janmat.cybrmoon.space -d janmatsuper.cybrmoon.space
# =============================================================================

# Rate Limiting Zones
limit_req_zone $binary_remote_addr zone=janmat_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=janmat_login:10m rate=5r/m;

# ─────────────────────────────────────────────────────────────────────────────
# FRONTEND: janmat.cybrmoon.space → Docker frontend container (:3000)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name janmat.cybrmoon.space;

    # Certbot will auto-add HTTPS redirect here after SSL setup.
    # For initial deploy, serve over HTTP first.

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # WebSocket support (for Vite HMR in dev, harmless in prod)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Deny dotfiles and sensitive extensions
    location ~ /\. { deny all; }
    location ~ \.(env|log|bak|sql)$ { deny all; }
}

# ─────────────────────────────────────────────────────────────────────────────
# BACKEND: janmatsuper.cybrmoon.space → Docker backend container (:8000)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name janmatsuper.cybrmoon.space;

    client_max_body_size 10M;

    # Django Admin Panel
    location /janmat-superadmin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Django Static Files (admin CSS/JS/images)
    location /static/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API endpoints with rate limiting
    location /api/ {
        limit_req zone=janmat_api burst=20 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # Timeouts for Sandbox API calls
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Login endpoints — stricter rate limiting
    location ~ ^/api/auth/.*/login/$ {
        limit_req zone=janmat_login burst=3 nodelay;

        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # Health check (no logging)
    location /api/health/ {
        access_log off;
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
    }

    # All other routes → Django (serves custom 404 page)
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Deny dotfiles and sensitive extensions
    location ~ /\. { deny all; }
    location ~ \.(env|log|bak|sql)$ { deny all; }
}
